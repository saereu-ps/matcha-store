<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-DLC Workshop — Unicorn Gym 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Slides are rendered here by JS from slides.js -->
    <div class="presentation" id="presentation"></div>

    <!-- Navigation -->
    <nav class="nav">
        <button class="nav__btn nav__btn--prev" id="prevBtn">← Prev</button>
        <div class="nav__progress" id="progress"></div>
        <button class="nav__btn nav__btn--next" id="nextBtn">Next →</button>
    </nav>

    <!-- Footer -->
    <footer class="footer">
        <span class="footer__copyright">© 2026 Amazon Web Services, Inc. or its affiliates. All rights reserved.</span>
        <span class="footer__slide-number" id="slideNumber">1 / 1</span>
    </footer>

    <!-- Slide content (edit this file to change slides) -->
    <script src="slides.js"></script>
    <!-- Presentation engine (renders slides + handles navigation) -->
    <script src="presentation.js"></script>
</body>
</html>
